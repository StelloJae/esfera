<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Writing — Esfera Research</title>
<meta name="description" content="Writing from Esfera Research — lab notes, posts, and failures, in the open.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">

<!-- No-FOUC theme: must run before CSS -->
<script>(function(){var t=localStorage.getItem('esfera-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --bg:        #f6f1e8;
  --bg-alt:    #efe9db;
  --surface:   #f9f5ef;
  --ink:       #2a241d;
  --ink-mid:   #5a4e43;
  --ink-faint: #9a8e82;
  --accent:    #d5560a;
  --rule:      #ccc4b7;

  --f-serif: "Fraunces", Georgia, "Times New Roman", serif;
  --f-body:  "Newsreader", Georgia, "Times New Roman", serif;
  --f-mono:  "IBM Plex Mono", "Courier New", monospace;

  --rail-w:   12rem;
  --pad-side: clamp(1.4rem, 4vw, 6rem);
  --pad-top:  clamp(2.8rem, 5.5vw, 5.5rem);
  --gap:      clamp(2.8rem, 5vw, 5rem);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:        #181410;
    --bg-alt:    #1f1b17;
    --surface:   #231f1b;
    --ink:       #ede6da;
    --ink-mid:   #a49a8e;
    --ink-faint: #4a4440;
    --accent:    #f58a26;
    --rule:      #302a24;
  }
}
:root[data-theme="dark"] {
  --bg:        #181410;
  --bg-alt:    #1f1b17;
  --surface:   #231f1b;
  --ink:       #ede6da;
  --ink-mid:   #a49a8e;
  --ink-faint: #4a4440;
  --accent:    #f58a26;
  --rule:      #302a24;
}

/* ── RESET ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: clamp(15px, calc(0.45vw + 13px), 22px);
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 1rem;
  line-height: 1.75;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: inherit; text-decoration: none; }
ul { list-style: none; }
img, svg { display: block; }

/* ── SHELL ───────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  width: min(94vw, 88rem);
  margin-inline: auto;
  min-height: 100vh;
}

/* ── RAIL ────────────────────────────────────────────────────────────── */
.rail {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: var(--pad-top) 1.5rem var(--pad-top) 0;
  border-right: 1px solid var(--rule);
  background: var(--bg);
  overflow: hidden;
  z-index: 20;
}

.brandblock {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  color: var(--ink);
}

.mark {
  width: 1.55rem;
  height: 1.55rem;
  flex-shrink: 0;
  stroke: var(--accent);
  fill: none;
  opacity: 0.88;
}

.brand-name {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--ink-mid);
  line-height: 1.35;
}

.lang-row {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  margin-top: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  flex-wrap: wrap;
}
.lang-row a { color: var(--ink-faint); }
.lang-row a:hover { color: var(--ink-mid); }

.theme-toggle {
  background: none;
  border: none;
  padding: 0;
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  cursor: pointer;
  line-height: 1;
  transition: color 0.14s ease;
}
.theme-toggle:hover { color: var(--accent); }
.theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

.rail-sep {
  width: 1.5rem;
  height: 1px;
  background: var(--rule);
  margin: 1.75rem 0;
  flex-shrink: 0;
}

.railnav {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
}

.railnav a {
  font-family: var(--f-serif);
  font-size: 0.875rem;
  font-weight: 300;
  font-style: italic;
  font-variation-settings: "opsz" 36;
  color: var(--ink-mid);
  line-height: 1.5;
  transition: color 0.14s ease;
}
.railnav a:hover,
.railnav a[aria-current="page"] { color: var(--accent); }

.rail-push { flex: 1; }

.rail-stamp {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
}

/* ── MAIN ────────────────────────────────────────────────────────────── */
.main {
  padding: var(--pad-top) var(--pad-side) calc(var(--pad-top) * 1.6);
}

/* ── PAGE HEADING ────────────────────────────────────────────────────── */
.page-title {
  font-family: var(--f-serif);
  font-size: clamp(2.2rem, 5vw, 4.5rem);
  font-weight: 600;
  font-variation-settings: "opsz" 72;
  letter-spacing: -0.025em;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: clamp(0.6rem, 1.2vw, 1rem);
}

.page-lede {
  font-family: var(--f-body);
  font-size: clamp(0.92rem, 1.5vw, 1.1rem);
  font-style: italic;
  color: var(--ink-mid);
  line-height: 1.7;
  max-width: 54ch;
  margin-bottom: clamp(2.2rem, 4vw, 3.5rem);
}

/* ── DIVIDER ─────────────────────────────────────────────────────────── */
.divider {
  border: none;
  border-top: 1px solid var(--rule);
  margin-bottom: clamp(2rem, 3.5vw, 3rem);
}

/* ── POST LIST ───────────────────────────────────────────────────────── */
.postlist {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: clamp(1.8rem, 3vw, 2.8rem);
  max-width: 60ch;
}

.postlist-item {
  border-left: 2.5px solid var(--rule);
  padding-left: 1.25rem;
  transition: border-color 0.14s ease;
}
.postlist-item:hover { border-color: var(--accent); }

.post-title {
  font-family: var(--f-serif);
  font-size: clamp(1.05rem, 1.8vw, 1.35rem);
  font-weight: 600;
  font-variation-settings: "opsz" 48;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 0.4rem;
  transition: color 0.14s ease;
}
.post-title:hover { color: var(--accent); }

.post-meta {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.07em;
  color: var(--ink-faint);
  text-transform: uppercase;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 0.35rem;
}

.post-meta .sep { color: var(--rule); }

.lang-links {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  display: flex;
  gap: 0.4rem;
  align-items: center;
  margin-top: 0.3rem;
}
.lang-links a {
  color: var(--ink-mid);
  border-bottom: 1px solid var(--rule);
  transition: color 0.14s ease, border-color 0.14s ease;
}
.lang-links a:hover { color: var(--accent); border-color: var(--accent); }

/* ── FOOTER SIG ──────────────────────────────────────────────────────── */
.foot-rule {
  border: none;
  border-top: 1px solid var(--rule);
  margin-top: var(--gap);
  margin-bottom: 1.25rem;
  max-width: 60ch;
}

.sig {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.sig-dot {
  width: 0.32rem;
  height: 0.32rem;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* ── FOCUS ───────────────────────────────────────────────────────────── */
a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

/* ── MOBILE ──────────────────────────────────────────────────────────── */
@media (max-width: 720px) {
  .shell {
    grid-template-columns: 1fr;
    width: min(96vw, 88rem);
  }
  .rail {
    position: static;
    height: auto;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    padding: 1.1rem 0;
    border-right: none;
    border-bottom: 1px solid var(--rule);
    gap: 0.6rem 1.25rem;
  }
  .rail-sep, .rail-push, .rail-stamp { display: none; }
  .lang-row { margin-top: 0; }
  .railnav {
    flex-direction: row;
    gap: 0 1.1rem;
    width: 100%;
    padding-top: 0.6rem;
    border-top: 1px solid var(--rule);
  }
  .main {
    padding-left: clamp(1rem, 4vw, 2.5rem);
    padding-right: clamp(1rem, 4vw, 2.5rem);
  }
}
</style>
</head>
<body>
<div class="shell">

  <aside class="rail">
    <a class="brandblock" href="../">
      <svg class="mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" stroke-width="1.15">
        <circle cx="16" cy="16" r="12.5"/>
        <ellipse cx="16" cy="16" rx="5.2" ry="12.5"/>
        <ellipse cx="16" cy="16" rx="12.5" ry="4.6"/>
      </svg>
      <span class="brand-name">Esfera<br>Research</span>
    </a>

    <div class="lang-row">
      <span>EN</span>
      &middot;
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light or dark theme"></button>
    </div>

    <div class="rail-sep"></div>

    <nav class="railnav" aria-label="Site navigation">
      <a href="./" aria-current="page">Writing</a>
      <a href="../">Home</a>
      <a href="https://github.com/StelloJae/esfera">GitHub</a>
    </nav>

    <div class="rail-push"></div>
    <span class="rail-stamp">Est.&nbsp;2026</span>
  </aside>

  <main class="main">

    <h1 class="page-title">Writing</h1>
    <p class="page-lede">Posts, lab notes, and failures — in the open. More as the lab runs.</p>

    <hr class="divider">

    <ul class="postlist">
      <li class="postlist-item">
        <p class="post-meta">
          <span>2026-06-14</span>
          <span class="sep">&middot;</span>
          <span>Launch</span>
        </p>
        <a class="post-title" href="2026-06-14-no-researchers.en.html">A lab with no researchers</a>
        <div class="lang-links">
          <a href="2026-06-14-no-researchers.en.html">English</a>
          <span>&middot;</span>
          <a href="2026-06-14-no-researchers.ko.html">한국어</a>
        </div>
      </li>
    </ul>

    <hr class="foot-rule">
    <p class="sig">
      <span class="sig-dot" aria-hidden="true"></span>
      Building in the open &middot; 2026
    </p>

  </main>

</div>

<script>(function(){var b=document.getElementById('themeToggle');function cur(){return document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');}function paint(){b.textContent=cur()==='dark'?'☀ light':'☾ dark';}b.addEventListener('click',function(){var n=cur()==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('esfera-theme',n);paint();});paint();})();</script>
</body>
</html>
