<!-- No-FOUC: read localStorage theme and apply before CSS loads -->
<script>
  (function(){
    var t = localStorage.getItem('theme');
    if (t === 'dark' || t === 'light') {
      document.documentElement.dataset.theme = t;
    }
  })();
</script>

<style>

/* ======================================================================
   ESFERA — Cosmic C2: Starlight + Nebula — Light + Dark pair
   ====================================================================== */

/* ── LIGHT TOKENS — default :root (dawn sky) ── */
:root {
  --bg:         #eef0f8;
  --bg-alt:     #e4e8f3;
  --surface:    #f7f8fc;
  --ink:        #181a2b;
  --ink-mid:    #51566e;
  --ink-faint:  #888ea6;
  --rule:       #d5d9e8;

  --accent:        #4a57a6;
  --accent-blue:   #3a52d6;
  --accent-violet: #7a3fd0;
  --accent-pink:   #cf3f86;

  --knockout-text: #eef0f8;

  --star-base-white:  #181a2b;
  --star-base-sl:     #4a57a6;
  --star-base-blue:   #3a52d6;
  --star-base-violet: #7a3fd0;
  --star-base-pink:   #cf3f86;
  --star-opacity-scale: 0.13;
  --starfield-opacity: 0.18;
  --nebula-opacity: 0.07;

  --f-poster: "Archivo Black", "Arial Black", sans-serif;
  --f-serif:  "Fraunces", Georgia, "Times New Roman", serif;
  --f-body:   "Newsreader", Georgia, "Times New Roman", serif;
  --f-mono:   "IBM Plex Mono", "Courier New", monospace;

  --rail-w:    12rem;
  --pad-side:  clamp(1.4rem, 4vw, 6rem);
  --pad-top:   clamp(2.8rem, 5.5vw, 5.5rem);
  --gap:       clamp(2.8rem, 5vw, 5rem);
  --prose-w:   66ch;
}

/* ── DARK TOKENS — auto (OS preference) ── */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg:         #0a0b12;
    --bg-alt:     #11131d;
    --surface:    #141622;
    --ink:        #eef1fa;
    --ink-mid:    #8c92a8;
    --ink-faint:  #4e5364;
    --rule:       #20232f;

    --accent:        #c4cdf0;
    --accent-blue:   #5b7cff;
    --accent-violet: #9d5cff;
    --accent-pink:   #ff5fa8;

    --knockout-text: #0a0b12;

    --star-base-white:  #eef1fa;
    --star-base-sl:     #c4cdf0;
    --star-base-blue:   #5b7cff;
    --star-base-violet: #9d5cff;
    --star-base-pink:   #ff5fa8;
    --starfield-opacity: 1;
    --nebula-opacity: 1;
  }
}

/* ── DARK TOKENS — manual force dark ── */
:root[data-theme="dark"] {
  --bg:         #0a0b12;
  --bg-alt:     #11131d;
  --surface:    #141622;
  --ink:        #eef1fa;
  --ink-mid:    #8c92a8;
  --ink-faint:  #4e5364;
  --rule:       #20232f;

  --accent:        #c4cdf0;
  --accent-blue:   #5b7cff;
  --accent-violet: #9d5cff;
  --accent-pink:   #ff5fa8;

  --knockout-text: #0a0b12;

  --star-base-white:  #eef1fa;
  --star-base-sl:     #c4cdf0;
  --star-base-blue:   #5b7cff;
  --star-base-violet: #9d5cff;
  --star-base-pink:   #ff5fa8;
  --starfield-opacity: 1;
  --nebula-opacity: 1;
}

/* ── LIGHT TOKENS — manual force light ── */
:root[data-theme="light"] {
  --bg:         #eef0f8;
  --bg-alt:     #e4e8f3;
  --surface:    #f7f8fc;
  --ink:        #181a2b;
  --ink-mid:    #51566e;
  --ink-faint:  #888ea6;
  --rule:       #d5d9e8;

  --accent:        #4a57a6;
  --accent-blue:   #3a52d6;
  --accent-violet: #7a3fd0;
  --accent-pink:   #cf3f86;

  --knockout-text: #eef0f8;

  --star-base-white:  #181a2b;
  --star-base-sl:     #4a57a6;
  --star-base-blue:   #3a52d6;
  --star-base-violet: #7a3fd0;
  --star-base-pink:   #cf3f86;
  --starfield-opacity: 0.18;
  --nebula-opacity: 0.07;
}

/* --- RESET ------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: clamp(15px, calc(0.45vw + 13px), 22px);
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: 1rem;
  line-height: 1.75;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  max-width: 100%;
  transition: background-color 0.2s ease, color 0.2s ease;
}

a { color: inherit; text-decoration: none; }
ul { list-style: none; }
img, svg { display: block; }

/* --- STARFIELD (reading-page: quieter — half the poster opacity) ------- */
#starfield {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
  /* reading pages: cap at 50% of the full starfield opacity */
  opacity: calc(var(--starfield-opacity) * 0.5);
  transition: opacity 0.3s ease;
}

.s-w  { fill: var(--star-base-white); }
.s-sl { fill: var(--star-base-sl); }
.s-b  { fill: var(--star-base-blue); }
.s-v  { fill: var(--star-base-violet); }
.s-pk { fill: var(--star-base-pink); }

@keyframes twinkle-a {
  0%, 100% { opacity: var(--star-op, 0.4); }
  50%       { opacity: calc(var(--star-op, 0.4) * 0.45); }
}
@keyframes twinkle-b {
  0%, 100% { opacity: var(--star-op, 0.5); }
  33%       { opacity: calc(var(--star-op, 0.5) * 0.35); }
  66%       { opacity: calc(var(--star-op, 0.5) * 0.8); }
}
@keyframes twinkle-c {
  0%, 100% { opacity: var(--star-op, 0.6); }
  40%       { opacity: calc(var(--star-op, 0.6) * 0.5); }
}
.star-twinkle-a { animation: twinkle-a 3.8s ease-in-out infinite; }
.star-twinkle-b { animation: twinkle-b 5.1s ease-in-out infinite; }
.star-twinkle-c { animation: twinkle-c 4.5s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .star-twinkle-a,
  .star-twinkle-b,
  .star-twinkle-c { animation: none; }
}

/* --- THEME TOGGLE ---------------------------------------------------- */
.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.32rem 0.72rem;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 2rem;
  cursor: pointer;
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.07em;
  color: var(--ink-faint);
  transition: border-color 0.15s ease, color 0.15s ease;
  flex-shrink: 0;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--ink-mid);
}
.theme-toggle:focus-visible {
  outline: 1px solid var(--accent);
  outline-offset: 3px;
}

.theme-toggle .tog-icon { font-style: normal; font-size: 0.9em; }

.tog-sun  { display: none; }
.tog-moon { display: inline; }

:root[data-theme="dark"] .tog-sun  { display: inline; }
:root[data-theme="dark"] .tog-moon { display: none; }

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .tog-sun  { display: inline; }
  :root:not([data-theme="light"]) .tog-moon { display: none; }
}

/* --- SHELL ------------------------------------------------------------ */
.shell {
  display: grid;
  grid-template-columns: var(--rail-w) 1fr;
  width: min(94vw, 88rem);
  margin-inline: auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* --- RAIL ------------------------------------------------------------- */
.rail {
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: var(--pad-top) 1.5rem var(--pad-top) 0;
  border-right: 1px solid var(--rule);
  background: transparent;
  overflow: hidden;
  z-index: 20;
}

.brandblock {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  color: var(--ink);
}

/* Sphere mark: strokes use theme accent vars */
.mark {
  width: 1.75rem;
  height: 1.75rem;
  flex-shrink: 0;
  border-radius: 5px;
  object-fit: cover;
  display: block;
  opacity: 0.96;
}

.brand-name {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--ink-mid);
  line-height: 1.35;
}

.lang-row {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  margin-top: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  flex-wrap: wrap;
}
.lang-row a { color: var(--ink-faint); }
.lang-row a:hover { color: var(--ink-mid); }

.rail-sep {
  width: 1.5rem;
  height: 1px;
  background: var(--rule);
  margin: 1.75rem 0;
  flex-shrink: 0;
}

.railnav {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
}

.railnav a {
  font-family: var(--f-serif);
  font-size: 0.875rem;
  font-weight: 300;
  font-style: italic;
  font-variation-settings: "opsz" 36;
  color: var(--ink-mid);
  line-height: 1.5;
  transition: color 0.14s ease;
}
.railnav a:hover,
.railnav a[aria-current="page"] { color: var(--accent); }

.rail-push { flex: 1; }

.rail-stamp {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 0.6rem;
}

/* --- MAIN ------------------------------------------------------------- */
.main {
  padding: var(--pad-top) var(--pad-side) calc(var(--pad-top) * 1.6);
  min-width: 0;
}

/* --- PAGE HEADING ----------------------------------------------------- */
.page-title {
  font-family: var(--f-serif);
  font-size: clamp(2.2rem, 5vw, 4.5rem);
  font-weight: 600;
  font-variation-settings: "opsz" 72;
  letter-spacing: -0.025em;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: clamp(0.6rem, 1.2vw, 1rem);
}

.page-lede {
  font-family: var(--f-body);
  font-size: clamp(0.92rem, 1.5vw, 1.1rem);
  font-style: italic;
  color: var(--ink-mid);
  line-height: 1.7;
  max-width: 54ch;
  margin-bottom: clamp(2.2rem, 4vw, 3.5rem);
}

/* --- DIVIDER ---------------------------------------------------------- */
.divider {
  border: none;
  border-top: 1px solid var(--rule);
  margin-bottom: clamp(2rem, 3.5vw, 3rem);
  /* Cosmic accent: gradient hairline */
  background: linear-gradient(90deg,
    var(--accent-blue) 0%,
    var(--accent-violet) 50%,
    var(--accent-pink) 100%);
  height: 1px;
  border: none;
  opacity: 0.35;
}

/* --- POST LIST -------------------------------------------------------- */
.postlist {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: clamp(1.8rem, 3vw, 2.8rem);
  max-width: 60ch;
}

.postlist-item {
  border-left: 2.5px solid var(--rule);
  padding-left: 1.25rem;
  transition: border-color 0.14s ease;
}
.postlist-item:hover { border-color: var(--accent-violet); }

.post-title {
  font-family: var(--f-serif);
  font-size: clamp(1.05rem, 1.8vw, 1.35rem);
  font-weight: 600;
  font-variation-settings: "opsz" 48;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 0.4rem;
  transition: color 0.14s ease;
  display: block;
}
.post-title:hover { color: var(--accent-blue); }

.post-meta {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.07em;
  color: var(--ink-faint);
  text-transform: uppercase;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 0.35rem;
}

.post-meta .sep { color: var(--rule); }

.lang-links {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  display: flex;
  gap: 0.4rem;
  align-items: center;
  margin-top: 0.3rem;
}
.lang-links a {
  color: var(--ink-mid);
  border-bottom: 1px solid var(--rule);
  transition: color 0.14s ease, border-color 0.14s ease;
}
.lang-links a:hover { color: var(--accent-blue); border-color: var(--accent-blue); }

/* --- FOOTER SIG ------------------------------------------------------- */
.foot-rule {
  border: none;
  height: 1px;
  background: var(--rule);
  margin-top: var(--gap);
  margin-bottom: 1.25rem;
  max-width: 60ch;
}

.sig {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--f-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.sig-dot {
  width: 0.32rem;
  height: 0.32rem;
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.65;
}
.sig-dot:nth-child(1) { background: var(--accent-blue); }
.sig-dot:nth-child(3) { background: var(--accent-violet); }

/* --- FOCUS ------------------------------------------------------------ */
a:focus-visible {
  outline: 1px solid var(--accent);
  outline-offset: 3px;
}

/* --- MOBILE ----------------------------------------------------------- */
@media (max-width: 720px) {
  .shell {
    grid-template-columns: 1fr;
    width: min(96vw, 88rem);
  }
  .rail {
    position: static;
    height: auto;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    padding: 1.1rem 0;
    border-right: none;
    border-bottom: 1px solid var(--rule);
    gap: 0.6rem 1.25rem;
  }
  .rail-sep, .rail-push, .rail-stamp { display: none; }
  .lang-row { margin-top: 0; }
  .railnav {
    flex-direction: row;
    gap: 0 1.1rem;
    width: 100%;
    padding-top: 0.6rem;
    border-top: 1px solid var(--rule);
  }
  .theme-toggle { margin-left: auto; }
  .main {
    padding-left: clamp(1rem, 4vw, 2.5rem);
    padding-right: clamp(1rem, 4vw, 2.5rem);
  }
}

</style>
</head>

<script>
  (function () {
    var btn = document.getElementById('themeToggle');
    var root = document.documentElement;

    function isDark() {
      var t = root.dataset.theme;
      if (t === 'dark') return true;
      if (t === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    btn.addEventListener('click', function () {
      var goingDark = !isDark();
      var next = goingDark ? 'dark' : 'light';
      root.dataset.theme = next;
      try { localStorage.setItem('theme', next); } catch(e) {}
    });
  })();
</script>
